<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filo – Join the Waitlist</title>
<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #fffdf7;
  color: #222;
}
.container {
  max-width: 680px;
  margin: 0 auto;
  padding: 40px 20px;
  text-align: center;
}
.logo {
  width: 80px;
  margin-bottom: 20px;
}
h1 {
  font-size: 32px;
  margin-bottom: 10px;
}
.tagline {
  color: #888;
  margin-bottom: 30px;
}
.cta {
  display: inline-block;
  background: #e8b84b;
  color: white;
  padding: 14px 24px;
  border-radius: 12px;
  font-weight: 600;
  text-decoration: none;
  margin-bottom: 40px;
}
.section {
  margin-top: 40px;
}
.features {
  text-align: left;
  margin-top: 20px;
}
.feature {
  margin-bottom: 15px;
  font-size: 15px;
}
.waitlist {
  margin-top: 50px;
}
.footer {
  margin-top: 60px;
  font-size: 12px;
  color: #bbb;
}

/* Tally iframe — tall enough to show full form without inner scroll */
.tally-frame {
  width: 100%;
  height: 520px;
  border: none;
  display: block;
}

/* On larger screens, bump up max-width and lay features out in a row */
@media (min-width: 600px) {
  .container {
    max-width: 860px;
    padding: 60px 40px;
  }
  h1 {
    font-size: 42px;
  }
  .features {
    display: flex;
    gap: 24px;
    justify-content: center;
  }
  .feature {
    flex: 1;
    background: #fff8e8;
    border-radius: 12px;
    padding: 18px 16px;
    font-size: 15px;
    margin-bottom: 0;
  }
  .tally-frame {
    height: 480px;
  }
}
</style>
</head>
<body>
<div class="container">
  <img src="logo.png" class="logo" onerror="this.style.display='none'"/>
  <h1>Your money, layered.</h1>
  <div class="tagline">
    Track income, expenses, and goals — all in one place.
  </div>
  <a href="#waitlist" class="cta">Join the waitlist</a>
  <div class="section">
    <div class="features">
      <div class="feature">💰 Visual breakdown of your money</div>
      <div class="feature">📊 Track income &amp; expenses effortlessly</div>
      <div class="feature">🎯 Set goals and hit them faster</div>
    </div>
  </div>
  <div class="waitlist" id="waitlist">
    <h2>Join the waitlist</h2>
    <p style="color:#888;">Be the first to get access to Filo.</p>
    <iframe
      class="tally-frame"
      src="https://tally.so/r/dWlvkD"
      scrolling="no"
      title="Filo waitlist">
    </iframe>
  </div>
</div>
</body>
</html>
