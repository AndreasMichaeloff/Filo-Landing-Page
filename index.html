<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filo – Join the Waitlist</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: white;
  background: linear-gradient(135deg, #3b0a57, #6a0f5f, #2d004d);
}

/* NAVBAR */
.navbar {
  width: 100%;
  padding: 20px 40px;
}

.navbar img {
  width: 40px;
}

/* CONTAINER */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

/* HERO */
.hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 50px;
}

/* LEFT SIDE */
.hero-left {
  max-width: 600px;
  text-align: center;
}

h1 {
  font-size: 42px;
  line-height: 1.1;
  margin-bottom: 20px;
  font-weight: 700;
}

h1 span {
  color: #e8b84b;
}

.tagline {
  color: #ddd;
  font-size: 18px;
  margin-bottom: 30px;
}

.cta {
  display: inline-block;
  background: #ff7a5c;
  color: white;
  padding: 16px 28px;
  border-radius: 999px;
  font-weight: 600;
  text-decoration: none;
}

/* PHONE */
.hero-right {
  display: flex;
  justify-content: center;
}

.phone {
  position: relative;
  width: 270px;
  border-radius: 40px;
  padding: 10px;
  background: #111;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5);
}

.phone img {
  width: 100%;
  border-radius: 30px;
  display: block;
}

/* Notch */
.phone::before {
  content: "";
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 25px;
  background: #000;
  border-radius: 20px;
}

/* WAITLIST */
.waitlist {
  margin-top: 80px;
  text-align: center;
}

.tally-frame {
  width: 100%;
  height: 700px;
  border: none;
}

/* FOOTER */
.footer {
  margin-top: 60px;
  font-size: 12px;
  color: #bbb;
  text-align: center;
}

/* DESKTOP */
@media (min-width: 900px) {
  .hero {
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
  }

  .hero-left {
    text-align: left;
  }

  h1 {
    font-size: 64px;
  }

  .phone {
    width: 320px;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <img src="filo.png" alt="Filo Logo">
</div>

<div class="container">

  <!-- HERO -->
  <div class="hero">

    <div class="hero-left">
      <h1>Your money, <span>layered.</span></h1>

      <div class="tagline">
        Track income, expenses, and goals — all in one place.
      </div>

      <a href="#waitlist" class="cta">Join the waitlist</a>
    </div>

    <div class="hero-right">
      <div class="phone">
        <img src="Filo_App.png" alt="Filo App">
      </div>
    </div>

  </div>

  <!-- WAITLIST -->
  <div class="waitlist" id="waitlist">
    <h2>Join the waitlist</h2>
    <p style="color:#ccc;">Be the first to get access to Filo.</p>

    <iframe
      class="tally-frame"
      src="https://tally.so/r/dWlvkD"
      scrolling="no">
    </iframe>
  </div>

  <div class="footer">© 2026 Filo</div>

</div>

</body>
</html>
