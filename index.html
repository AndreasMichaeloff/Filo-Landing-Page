<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filo – Join the Waitlist</title>

<!-- FAVICON -->
<link rel="icon" type="image/png" href="filo.png">
<link rel="icon" type="image/png" sizes="32x32" href="Filo.png">
<link rel="icon" type="image/png" sizes="16x16" href="Filo.png">
<link rel="apple-touch-icon" href="filo.png">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #fffdf7;
  color: #222;
}

/* TOP BAR */
.navbar {
  width: 100%;
  padding: 18px 40px;
  background: rgba(255, 248, 232, 0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #f0e2b8;
}

.navbar img {
  width: 42px;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 60px 20px;
}

/* HERO */
.hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 50px;
}

/* LEFT */
.hero-left {
  max-width: 520px;
  text-align: center;
}

h1 {
  font-size: 40px;
  line-height: 1.1;
  margin-bottom: 16px;
  font-weight: 700;
}

h1 span {
  color: #e8b84b;
}

.tagline {
  color: #888;
  font-size: 18px;
  margin-bottom: 28px;
}

.cta {
  display: inline-block;
  background: #e8b84b;
  color: white;
  padding: 16px 26px;
  border-radius: 14px;
  font-weight: 600;
  text-decoration: none;
}

/* PHONE */
.hero-right {
  display: flex;
  justify-content: center;
}

.phone {
  position: relative;
  width: 270px;
  border-radius: 42px;
  padding: 10px;
  background: linear-gradient(145deg, #1a1a1a, #000);
  box-shadow: 
    0 30px 80px rgba(0,0,0,0.25),
    inset 0 0 0 2px #2a2a2a;
}

/* screen */
.phone img {
  width: 100%;
  border-radius: 32px;
  display: block;
}

/* notch */
.phone::before {
  content: "";
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 110px;
  height: 26px;
  background: #000;
  border-radius: 20px;
  z-index: 2;
}

/* LEFT BUTTONS */
.phone .btn-left {
  position: absolute;
  left: -4px;
  top: 80px;
  width: 4px;
  height: 40px;
  background: #2a2a2a;
  border-radius: 2px;
}

.phone .btn-left-2 {
  position: absolute;
  left: -4px;
  top: 130px;
  width: 4px;
  height: 60px;
  background: #2a2a2a;
  border-radius: 2px;
}

/* RIGHT BUTTON */
.phone .btn-right {
  position: absolute;
  right: -4px;
  top: 110px;
  width: 4px;
  height: 70px;
  background: #2a2a2a;
  border-radius: 2px;
}

/* glow */
.phone::after {
  content: "";
  position: absolute;
  inset: -30px;
  background: radial-gradient(circle, rgba(232,184,75,0.15), transparent 70%);
  border-radius: 60px;
  z-index: -1;
}

/* WAITLIST */
.waitlist {
  margin-top: 80px;
  text-align: center;
}

.tally-frame {
  width: 100%;
  height: 700px;
  border: none;
}

/* FOOTER */
.footer {
  margin-top: 60px;
  font-size: 12px;
  color: #bbb;
  text-align: center;
}

/* DESKTOP */
@media (min-width: 900px) {
  .hero {
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
  }

  .hero-left {
    text-align: left;
  }

  h1 {
    font-size: 60px;
  }

  .phone {
    width: 320px;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <img src="Filo.png" alt="Filo Logo">
</div>

<div class="container">

  <!-- HERO -->
  <div class="hero">

    <div class="hero-left">
      <h1>Your money, <span>layered.</span></h1>

      <div class="tagline">
        Track income, expenses, and goals — all in one place.
      </div>

      <a href="#waitlist" class="cta">Join the waitlist</a>
    </div>

    <div class="hero-right">
      <div class="phone">

        <div class="btn-left"></div>
        <div class="btn-left-2"></div>
        <div class="btn-right"></div>

        <img src="Filo_App.png" alt="Filo App">

      </div>
    </div>

  </div>

  <!-- WAITLIST -->
  <div class="waitlist" id="waitlist">
    <h2>Join the waitlist</h2>
    <p style="color:#888;">Be the first to get access to Filo.</p>

    <iframe
      class="tally-frame"
      src="https://tally.so/r/dWlvkD"
      scrolling="no">
    </iframe>
  </div>

  <div class="footer">© 2026 Filo</div>

</div>

</body>
</html>
