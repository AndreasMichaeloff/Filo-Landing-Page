<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filo – Your money, layered.</title>
<link rel="icon" type="image/png" href="filo.png">
<link rel="apple-touch-icon" href="filo.png">

<style>
  :root {
    --gold:    #e8b84b;
    --gold-dk: #c49a30;
    --cream:   #fffdf7;
    --warm:    #f5ead0;
    --text:    #1a1410;
    --muted:   #8a7d6a;
    --border:  #ecdfc4;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: serif;
    background: var(--cream);
    color: var(--text);
    overflow-x: hidden;
  }

  /* NAV */
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 32px;
    background: #e8b84b;
  }

  .nav-logo img { height: 48px; display: block; }

  .pill-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: serif;
    font-size: 15px;
    padding: 13px 30px;
    border-radius: 999px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    background: var(--gold);
    color: #fff;
  }

  .nav .pill-btn {
    background: #fff;
    color: #b8861e;
    font-weight: bold;
  }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: 110px 60px 80px;
    max-width: 1160px;
    margin: 0 auto;
    gap: 70px;
  }

  .hero-text { flex: 1; max-width: 480px; }

  h1 {
    font-size: clamp(44px, 5.5vw, 70px);
    margin-bottom: 22px;
  }

  .hero-sub {
    font-size: 17px;
    color: var(--muted);
    margin-bottom: 38px;
  }

  .hero-phone img {
    width: 260px;
  }

  /* ── NEW 3D SHOWCASE ───────────────── */
  .showcase-3d {
    padding: 120px 20px;
    background: #f9f4e7;
    display: flex;
    justify-content: center;
  }

  .showcase-inner {
    position: relative;
    perspective: 1200px;
  }

  .phone-3d {
    width: 260px;
    border-radius: 40px;
    overflow: hidden;
    transform: rotateY(-18deg) rotateX(10deg);
    box-shadow:
      0 40px 80px rgba(0,0,0,0.35),
      0 10px 30px rgba(0,0,0,0.2);
    transition: transform 0.6s ease;
  }

  .phone-3d img {
    width: 100%;
    display: block;
  }

  .phone-3d:hover {
    transform: rotateY(-10deg) rotateX(6deg) scale(1.03);
  }

  .floating-shape {
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0.5;
  }

  .shape-1 {
    width: 200px;
    height: 200px;
    background: #e8b84b;
    top: -60px;
    left: -100px;
  }

  .shape-2 {
    width: 260px;
    height: 260px;
    background: #c49a3a;
    bottom: -80px;
    right: -120px;
  }

  /* WAITLIST */
  .waitlist-section {
    padding: 100px 32px;
    max-width: 700px;
    margin: 0 auto;
    text-align: center;
  }

  .tally-frame {
    width: 100%;
    height: 700px;
    border: none;
    border-radius: 20px;
  }

</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <img src="filo-alt logo.png">
  <a href="#waitlist" class="pill-btn">Unlock Filo</a>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h1>Your money, layered.</h1>
    <p class="hero-sub">
      Track income streams, expenses, and goals — all in one beautifully simple app.
    </p>
  </div>

  <div class="hero-phone">
    <img src="Filo_App.png">
  </div>
</section>

<!-- 🔥 NEW SECTION -->
<section class="showcase-3d">
  <div class="showcase-inner">

    <div class="phone-3d">
      <img src="Filo_Trends.png">
    </div>

    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>

  </div>
</section>

<!-- WAITLIST -->
<section class="waitlist-section" id="waitlist">
  <h2>Get early access</h2>
  <iframe
    class="tally-frame"
    src="https://tally.so/r/dWlvkD">
  </iframe>
</section>

</body>
</html>
